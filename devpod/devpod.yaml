name: zarishsphere-devpod
provider: docker
ports:
  - 3000:3000 # For Open WebUI

# Base image for the DevPod sandbox. Bumped from ubuntu:22.04 (aging) to
# ubuntu:24.04 — the current LTS with the longest remaining support window
# of the well-tested Docker base images. This is independent of the host
# machine's OS (Mint/Lite/Ubuntu 26.04) by design — the sandbox never needs
# to match the host.
image: ubuntu:24.04

init_scripts:
  - /usr/bin/env bash /workspace/scripts/bootstrap.sh

volumes:
  - .:/workspace

env:
  NVM_DIR: "/home/ubuntu/.nvm"
  PATH: "/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin:/home/ubuntu/.local/bin:/home/ubuntu/go/bin:/home/ubuntu/.nvm/versions/node/v24/bin"

ssh_agent: true

lifecycle_hooks:
  post_create:
    - command: "devpod up"
  post_start:
    - command: "devpod exec chezmoi apply"
    - command: "devpod exec ollama serve &"
    # Open WebUI: pin updated from the stale v0.5.21 to v0.9.5 (verified
    # 19 July 2026). Re-check https://github.com/open-webui/open-webui/releases
    # before bumping further — never use :main or :latest here.
    - command: "devpod exec docker run -d --name open-webui --restart always -p 3000:8080 -v open-webui:/app/backend/data --add-host=host.docker.internal:host-gateway ghcr.io/open-webui/open-webui:v0.9.5"
