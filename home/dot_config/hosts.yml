# ~/.config/gh/hosts.yml
# GitHub CLI — per-host authentication
# Managed by: codeandbrain/dotfiles (chezmoi)
# =====================================================================
# NOTE: This file is regenerated by 'gh auth login'
# The version here is the clean template — duplicates removed.
# After applying dotfiles, run: gh auth login
# to re-authenticate if needed.
# =====================================================================

github.com:
    git_protocol: ssh
    # Active account for this machine.
    # codeandbrain = personal dev account (this machine's identity)
    # arwazarish   = ZarishSphere org owner account (for org operations)
    # Use: gh auth switch --user arwazarish  (to switch to org account)
    users:
        codeandbrain:
        arwazarish:
    user: codeandbrain
